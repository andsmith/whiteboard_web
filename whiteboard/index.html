<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json" />
    <title>whiteboard-web</title>
  </head>
  <body>
    <div id="whiteboard-app">

      <div id="title-bar">
        <h1 id="title-text">Whiteboard-Web (Disconnected)</h1>
        <div id="title-chips">
          <button id="debug-chip" type="button" title="Toggle debug window">Debug</button>
          <button id="participants-chip" type="button" title="Toggle participants">Participants (0)</button>
        </div>
      </div>

      <div id="canvas-area">
        <canvas id="canvas"></canvas>

        <div id="tools-panel">
          <div id="nav-tools" class="tool-group nav-tools"></div>
          <div id="draw-tools" class="tool-group draw-tools"></div>
          <div id="colors-group" class="color-group"></div>
        </div>

        <div id="participants-panel">
          <div id="participants-tab">▸ 0</div>
          <div id="participants-content">
            <div class="participants-header-row">
              <span id="participants-header">Participants</span>
              <button id="btn-collapse-participants" type="button" title="Collapse">▸</button>
            </div>
            <ul id="participants-list"></ul>
            <button id="btn-leave-meeting" type="button">Leave meeting</button>
          </div>
        </div>

        <div id="debug-panel">
          <div id="debug-tab">▸ Debug</div>
          <div id="debug-content">
            <div class="participants-header-row">
              <span id="debug-header">Debug window</span>
              <button id="btn-debug-clear" type="button" title="Clear log">Clear</button>
              <button id="btn-collapse-debug" type="button" title="Collapse">▸</button>
            </div>
            <ul id="debug-list"></ul>
          </div>
        </div>
      </div>

      <div id="bottom-bar">
        <div class="bottom-group">
          <button id="btn-undo" class="cmd-btn" type="button" title="Undo"></button>
          <button id="btn-redo" class="cmd-btn" type="button" title="Redo"></button>
          <button id="btn-trash" class="cmd-btn" type="button" title="Trash my changes"></button>
        </div>
        <div class="divider"></div>
        <div class="bottom-group">
          <button id="btn-save" class="cmd-btn" type="button" title="Save to file"></button>
          <button id="btn-load" class="cmd-btn" type="button" title="Load from file"></button>
        </div>
        <div class="divider"></div>
        <div class="bottom-group">
          <button id="btn-thickness" class="cmd-btn" type="button" title="Line thickness"></button>
          <button id="btn-fontsize" class="cmd-btn" type="button" title="Font size"></button>
        </div>
        <div class="divider"></div>
        <div class="bottom-group">
          <button id="btn-snapgrid" class="cmd-btn" type="button" title="Snap to grid"></button>
          <button id="btn-showgrid" class="cmd-btn" type="button" title="Show grid"></button>
        </div>
        <div class="divider"></div>
        <div id="zoom-area">
          <span id="zoom-label">Zoom: 1.00</span>
        </div>
      </div>
    </div>

    <div id="thickness-popup" class="dial-popup" role="tooltip">
      <div class="dial-label">Thickness: <span id="thickness-value">2</span></div>
      <svg id="thickness-sample" viewBox="0 0 120 30" preserveAspectRatio="none"
           style="width:120px;height:30px;display:block;margin:0 auto">
        <line x1="6" y1="15" x2="114" y2="15" stroke="#202020" stroke-linecap="round" stroke-width="2"/>
      </svg>
    </div>

    <div id="fontsize-popup" class="dial-popup" role="tooltip">
      <div class="dial-label">Font size: <span id="fontsize-value">16</span></div>
      <div id="fontsize-sample">Ab</div>
    </div>

    <dialog id="join-dialog">
      <h2>Whiteboard-Web</h2>
      <p class="subtitle">v0.01 — collaborative p2p whiteboard</p>

      <div class="dialog-row">
        <label for="dlg-name">Your name:</label>
        <input id="dlg-name" type="text" maxlength="40" autocomplete="name" placeholder="required" />
        <button id="dlg-btn-enter" type="button" disabled>Enter</button>
        <span id="dlg-name-state"></span>
      </div>

      <div class="dialog-row">
        <label for="dlg-room-code">Meeting code:</label>
        <input id="dlg-room-code" type="text" autocomplete="off"
               placeholder="e.g. brave-azure-fox" />
        <span class="hint">(leave blank to create new)</span>
      </div>

      <div class="dialog-actions">
        <button id="dlg-btn-create" type="button" disabled>Create new meeting</button>
        <button id="dlg-btn-join" type="button" disabled>Join meeting</button>
      </div>

      <div id="dlg-status"></div>
    </dialog>

    <script type="module" src="/src/whiteboard/main.ts"></script>
  </body>
</html>
