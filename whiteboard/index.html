<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/whiteboard_web/favicon.ico" />
    <link rel="manifest" href="/whiteboard_web/manifest.json" />
    <title>whiteboard-web</title>
    <style>
      body { font-family: sans-serif; margin: 1rem; }
      #board { border: 1px solid #888; display: block; touch-action: none; }
      .signaling { margin-top: 1rem; display: grid; gap: 0.5rem; max-width: 720px; }
      .signaling textarea { width: 100%; height: 6rem; font-family: monospace; font-size: 0.8rem; }
      .row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
      nav a { font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <nav><a href="../">&larr; home</a></nav>
    <h1>whiteboard-web</h1>
    <p><em>Stub. P2P collaborative whiteboard over WebRTC (manual SDP for now).</em></p>

    <canvas id="board" width="800" height="500"></canvas>

    <section class="signaling">
      <h2>Signaling (manual SDP copy/paste)</h2>
      <div class="row">
        <button id="btn-create-offer">Create offer</button>
        <button id="btn-accept-offer">Accept pasted offer &rarr; create answer</button>
        <button id="btn-accept-answer">Accept pasted answer</button>
      </div>
      <label>Local SDP (copy to peer):
        <textarea id="local-sdp" readonly placeholder="generated offer/answer appears here"></textarea>
      </label>
      <label>Remote SDP (paste from peer):
        <textarea id="remote-sdp" placeholder="paste peer's offer or answer here"></textarea>
      </label>
      <div id="status">status: idle</div>
    </section>

    <script type="module" src="/src/whiteboard/main.ts"></script>
  </body>
</html>
